name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test (OTP ${{ matrix.otp }}, Elixir ${{ matrix.elixir }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        elixir: ["1.18", "1.19"]
        otp:    ["27", "28"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
          hexpm-mirrors: |
            https://builds.hex.pm
            https://cdn.jsdelivr.net/hex

      - name: Update Hex
        run: mix local.hex --force

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: deps-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: build-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Install dependencies
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 10
          retry_wait_seconds: 5
          command: mix deps.get

      - name: Run tests
        run: mix test

  static_analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Determine latest versions from matrix
        id: latest
        run: |
          # Extract last element of each matrix array
          echo "elixir_latest=${{ matrix.elixir[1] }}" >> $GITHUB_OUTPUT
          echo "otp_latest=${{ matrix.otp[1] }}" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-elixir@v1
        with:
          elixir-version: "${{ steps.latest.outputs.elixir_latest }}"
          otp-version:    "${{ steps.latest.outputs.otp_latest }}"
          #cache-key: v1

      - name: Update Hex
        run: mix local.hex --force

      - name: Install dependencies
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 10
          retry_wait_seconds: 5
          command: mix deps.get

      - name: Run Credo
        run: mix credo suggest --strict
        continue-on-error: true

  docs:
    name: Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Determine latest versions from matrix
        id: latest
        run: |
          # Extract last element of each matrix array
          echo "elixir_latest=${{ matrix.elixir[1] }}" >> $GITHUB_OUTPUT
          echo "otp_latest=${{ matrix.otp[1] }}" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-elixir@v1
        with:
          elixir-version: "${{ steps.latest.outputs.elixir_latest }}"
          otp-version:    "${{ steps.latest.outputs.otp_latest }}"
          #cache-key: v1

      - name: Update Hex
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 10
          retry_wait_seconds: 5
          command: mix local.hex --force

      - name: Install dependencies
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 10
          retry_wait_seconds: 5
          command: mix deps.get

      - name: Generate documentation
        run: mix docs

      - name: Check that docs build successfully
        run: test -d doc && echo "==> Documentation generated successfully"

  create-tag:
    name: Create Tag if Version Changed
    runs-on: ubuntu-latest
    needs: [test, static_analysis, docs]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get project version
        id: project_version
        run: |
          VERSION=$(sed -nE 's/.*version:\s*"([^"]+)".*/\1/p' mix.exs | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Project version: $VERSION"

      - name: Check if tag should be created
        id: should_create_tag
        run: |
          PROJECT_VERSION="${{ steps.project_version.outputs.version }}"
          MAX_TAG=$(git tag -l "*.*.*" | sort -V | tail -1)

          if [ -z "$MAX_TAG" ]; then
            echo "create_tag=true" >> $GITHUB_OUTPUT
            echo "First tag: $PROJECT_VERSION"
          else
            if [ "$(printf '%s\n' "$MAX_TAG" "$PROJECT_VERSION" | sort -V | tail -1)" = "$PROJECT_VERSION" ] && [ "$MAX_TAG" != "$PROJECT_VERSION" ]; then
              echo "create_tag=true" >> $GITHUB_OUTPUT
              echo "Project version $PROJECT_VERSION is greater than max tag $MAX_TAG, creating tag"
            else
              echo "create_tag=false" >> $GITHUB_OUTPUT
              echo "Project version $PROJECT_VERSION is not greater than max tag $MAX_TAG, skipping tag creation"
            fi
          fi

      - name: Create and push tag
        if: steps.should_create_tag.outputs.create_tag == 'true'
        run: |
          VERSION="${{ steps.project_version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push https://x-access-token:${{ secrets.RELEASE_PAT }}@github.com/${{ github.repository }}.git "$VERSION"

      - name: Trigger release workflow
        if: steps.should_create_tag.outputs.create_tag == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.RELEASE_PAT }}
          script: |
            // Explicitly trigger the release workflow via the GitHub API.
            // GitHub Actions has a limitation: workflows triggered by other workflows don't
            // automatically trigger additional workflows, even with a PAT. The release.yaml
            // workflow has workflow_dispatch enabled to allow manual triggering via the API.
            const version = "${{ steps.project_version.outputs.version }}";
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release.yaml',
              ref: version,
              inputs: {}
            });
