name: Release

on:
  push:
    tags:
      - "*.*.*"
  # Allow manual triggering of the release workflow via GitHub API.
  # The CI workflow uses this to explicitly dispatch the release when a new tag is created,
  # since workflows triggered by other workflows don't automatically trigger downstream workflows.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (optional, uses current ref if not provided)"
        required: false
        default: ""

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Elixir
        uses: erlef/setup-elixir@v1
        with:
          elixir-version: latest
          otp-version: latest

      - name: Install dependencies
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 10
          retry_wait_seconds: 5
          command: mix deps.get

      - name: Build escript
        run: mix escript.build

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Get changelog entry
        id: changelog
        run: |
          # Extract changelog for this version
          VERSION="${{ steps.version.outputs.version }}"
          # Look for the version in CHANGELOG.md or fall back to git log
          if [ -f "CHANGELOG.md" ]; then
            # Extract section between version header and next version header
            awk "/^## ${VERSION#v}/{flag=1;next}/^## v[0-9]/{flag=0}flag" CHANGELOG.md > changelog.txt
            if [ -s changelog.txt ]; then
              echo "has_changelog=true" >> $GITHUB_OUTPUT
            else
              # Fallback to commit messages
              echo "has_changelog=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_changelog=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: ./dbml
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-to-hex:
    name: Publish to Hex.pm
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current tag version
        id: current_version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Check if tag is greater than max remote tag
        id: should_publish
        run: |
          # If triggered via workflow_dispatch by the ci.yaml action, always
          # publish (already verified by CI)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "publish=true" >> $GITHUB_OUTPUT
            echo "Triggered via workflow_dispatch, publishing"
            exit 0
          fi

          CURRENT_TAG="${{ steps.current_version.outputs.version }}"
          MAX_TAG=$(git tag -l "*.*.*" | sort -V | tail -1)

          if [ -z "$MAX_TAG" ]; then
            echo "publish=true" >> $GITHUB_OUTPUT
            echo "First release: $CURRENT_TAG"
          else
            # Compare versions: if CURRENT_TAG > MAX_TAG, publish
            if [ "$(printf '%s\n' "$MAX_TAG" "$CURRENT_TAG" | sort -V | tail -1)" = "$CURRENT_TAG" ] && [ "$MAX_TAG" != "$CURRENT_TAG" ]; then
              echo "publish=true" >> $GITHUB_OUTPUT
              echo "Current tag $CURRENT_TAG is greater than max tag $MAX_TAG"
            else
              echo "publish=false" >> $GITHUB_OUTPUT
              echo "Current tag $CURRENT_TAG is not greater than max tag $MAX_TAG, skipping publish"
            fi
          fi

      - name: Setup Elixir
        if: steps.should_publish.outputs.publish == 'true'
        uses: erlef/setup-elixir@v1
        with:
          elixir-version: latest
          otp-version: latest

      - name: Install dependencies
        if: steps.should_publish.outputs.publish == 'true'
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: mix deps.get

      - name: Publish to Hex.pm
        if: steps.should_publish.outputs.publish == 'true'
        run: |
          set +e
          output=$(mix hex.publish --yes 2>&1)
          exit_code=$?
          echo "$output"

          if [ $exit_code -ne 0 ] && echo "$output" | grep -q "must include the --replace flag"; then
            echo "Package already exists, retrying with --replace flag..."
            mix hex.publish --yes --replace
          else
            exit $exit_code
          fi
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

      - name: Retire prior version
        if: steps.should_publish.outputs.publish == 'true'
        run: |
          set +e
          APP=$(sed -nE '/app:/{s/.*app:\s*:([a-z_]+).*/\1/p; q}' mix.exs)
          VSN=$(mix hex.info $APP | grep "^Releases:" | sed 's/Releases: //; s/, /\n/g' | sed '/retired/d; /\.\.\./d' | sed -n '$p')
          if [ -z "$VSN" ]; then
            echo "$APP: no stale versions were found on Hex"
          else
            echo "Retiring version $VSN of $APP on Hex..."
            mix hex.retire $APP $VSN deprecated --message "Deprecated" --yes
          fi
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
